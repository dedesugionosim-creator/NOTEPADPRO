            localStorage.setItem(key, JSON.stringify(data));

        // ============================================================
        // FUNGSI GLOBAL - FORMAT MATA UANG
        // ============================================================
        function formatJuta(nilai) {
            if (typeof nilai !== 'number' || isNaN(nilai)) return '0';
            if (Math.abs(nilai) >= 1000000) return (nilai / 1000000).toFixed(1) + 'M';
            if (Math.abs(nilai) >= 1000) return (nilai / 1000).toFixed(1) + 'K';
            return nilai.toString();
        }

        // ============================================================
        // FUNGSI GLOBAL - ESTIMASI UKURAN STORAGE
        // ============================================================
        function estimasiUkuranStorage() {
            var total = 0;
            for (var i = 0; i < localStorage.length; i++) {
                var key = localStorage.key(i);
                var value = localStorage.getItem(key) || '';
                total += key.length + value.length;
            }
            return Math.round(total / 1024);
        }

        // FUNGSI GLOBAL - DATA KERANJANG PELANGGAN

            var statusText = document.getElementById('status-text');
            if (!statusText) return;
            
            if (navigator.onLine) {
                statusText.textContent = 'Online';
                document.body.classList.remove('offline');
            } else {
                statusText.textContent = 'Offline';
                document.body.classList.add('offline');
            }

        // ============================================================
        // EVENT LISTENER ONLINE/OFFLINE
        // ============================================================

    <script>
        // Variabel untuk menampung event beforeinstallprompt
        var deferredPrompt;

        // Tangkap event beforeinstallprompt (muncul saat browser mendeteksi PWA)
        window.addEventListener('beforeinstallprompt', function(event) {
            // Cegah prompt otomatis agar kita bisa menampilkan tombol instal kustom
            event.preventDefault();
            // Simpan event untuk digunakan nanti
            deferredPrompt = event;
            // Tampilkan tombol instal yang ada di halaman
            var installBtn = document.getElementById('install-btn');
            if (installBtn) {
                installBtn.style.display = 'inline-block';
            }
            console.log('📲 Prompt instal PWA tersedia');
        });

        // Tangani klik tombol instal
        document.getElementById('install-btn').addEventListener('click', function() {
            if (deferredPrompt) {
                // Tampilkan prompt instalasi
                deferredPrompt.prompt();
                // Tunggu hasil pilihan user
                deferredPrompt.userChoice.then(function(result) {
                    console.log('📲 Hasil instal: ' + result.outcome);
                    // Reset variabel setelah digunakan
                    deferredPrompt = null;
                });
            }
        });

        console.log('✅ Blok 5 R1 - Instal PWA Prompt berhasil dimuat (Revisi UTF-8)');
