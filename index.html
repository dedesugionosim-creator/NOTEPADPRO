<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#1E1E1E">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="NotepadPro++ - Catatan Kode SuperAdmin">
    <title>NotepadPro++</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="data:application/json,{}">

    <!-- Font Awesome 6.5.1 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Google Fonts: Inter untuk UI, JetBrains Mono untuk Editor Kode -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">

    <style>
        /* ============================================ */
        /* CSS VARIABLES (TEMA HITAM-PUTIH-HIJAU)       */
        /* ============================================ */
        :root {
            --bg-primary: #1E1E1E;
            --bg-secondary: #252526;
            --bg-tertiary: #2D2D2D;
            --bg-hover: #3E3E3E;
            --text-primary: #CCCCCC;
            --text-secondary: #9CA3AF;
            --accent-green: #4CAF50;
            --accent-green-hover: #66BB6A;
            --accent-green-bg: rgba(76, 175, 80, 0.15);
            --border-color: #3E3E3E;
            --danger: #EF4444;
            --warning: #F59E0B;
            --info: #3B82F6;
            --white: #FFFFFF;
            --black: #000000;
            --radius-sm: 4px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --shadow: 0 4px 6px rgba(0,0,0,0.3);
            --sidebar-width: 260px;
        }

        /* ============================================ */
        /* RESET GLOBAL                                 */
        /* ============================================ */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-primary);
            color: var(--text-primary);
            line-height: 1.6;
            overflow: hidden;
        }

        body {
            display: flex;
            flex-direction: column;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: var(--bg-secondary); }
        ::-webkit-scrollbar-thumb { background: var(--border-color); border-radius: 3px; }

        /* ============================================ */
        /* TIPOGRAFI & EDITOR KODE                      */
        /* ============================================ */
        .code-editor {
            font-family: 'JetBrains Mono', 'Courier New', monospace;
            background-color: var(--bg-secondary);
            color: var(--accent-green);
            border: 1px solid var(--border-color);
            padding: 15px;
            border-radius: var(--radius-md);
            width: 100%;
            resize: vertical;
            line-height: 1.8;
            tab-size: 4;
            font-size: 14px;
            outline: none;
        }

        /* ============================================ */
        /* KOMPONEN UMUM                                */
        /* ============================================ */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            border-radius: var(--radius-md);
            font-weight: 600;
            cursor: pointer;
            border: none;
            transition: all 0.2s ease;
            font-size: 14px;
            font-family: 'Inter', sans-serif;
            text-decoration: none;
            white-space: nowrap;
        }
        .btn-primary { background: var(--accent-green); color: var(--white); }
        .btn-primary:hover { background: var(--accent-green-hover); transform: translateY(-1px); }
        .btn-outline { background: transparent; border: 1px solid var(--border-color); color: var(--text-primary); }
        .btn-outline:hover { background: var(--bg-hover); border-color: var(--accent-green); }
        .btn-danger { background: var(--danger); color: var(--white); }
        .btn-sm { padding: 6px 12px; font-size: 12px; }
        .btn-block { width: 100%; }

        /* Form */
        input, textarea, select {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-primary);
            padding: 12px 15px;
            border-radius: var(--radius-md);
            width: 100%;
            font-family: 'Inter', sans-serif;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        input:focus, textarea:focus, select:focus { border-color: var(--accent-green); }
        textarea { resize: vertical; min-height: 80px; }

        /* Badge */
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-success { background: var(--accent-green-bg); color: var(--accent-green); }
        .badge-error { background: rgba(239,68,68,0.2); color: var(--danger); }
        .badge-pro { background: var(--accent-green-bg); color: var(--accent-green); }
        .badge-free { background: var(--bg-tertiary); color: var(--text-secondary); }

        /* ============================================ */
        /* LAYOUT UTAMA (SIDEBAR & MAIN CONTENT)        */
        /* ============================================ */
        .app-container {
            display: flex;
            height: 100%;
            width: 100%;
        }
        .sidebar {
            width: var(--sidebar-width);
            background: var(--bg-secondary);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow-y: auto;
        }
        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: var(--bg-primary);
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid var(--border-color);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
        }
        .sidebar-menu { flex: 1; padding: 10px; }
        .sidebar-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 15px;
            border-radius: var(--radius-md);
            cursor: pointer;
            margin-bottom: 4px;
            color: var(--text-secondary);
            transition: all 0.2s;
            font-weight: 500;
        }
        .sidebar-item i { width: 20px; text-align: center; font-size: 16px; }
        .sidebar-item:hover { background: var(--bg-hover); color: var(--text-primary); }
        .sidebar-item.active { background: var(--accent-green-bg); color: var(--accent-green); font-weight: 600; }

        .user-footer {
            padding: 15px;
            border-top: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        /* ============================================ */
        /* CARDS & TABLES                               */
        /* ============================================ */
        .card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 20px;
            margin-bottom: 20px;
        }
        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            font-size: 18px;
            font-weight: 600;
        }

        .grid-2 { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }

        table { width: 100%; border-collapse: collapse; }
        th {
            text-align: left;
            padding: 12px;
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        td { padding: 12px; border-bottom: 1px solid var(--border-color); font-size: 14px; }
        tr:hover td { background: var(--bg-hover); }

        /* ============================================ */
        /* MODAL                                        */
        /* ============================================ */
        .modal-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .modal-box {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-lg);
            width: 90%;
            max-width: 500px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 20px;
            border-bottom: 1px solid var(--border-color);
            font-weight: 600;
        }
        .modal-body { padding: 20px; }
        .modal-footer {
            padding: 15px 20px;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: flex-end;
            gap: 10px;
        }

        /* ============================================ */
        /* CHAT                                          */
        /* ============================================ */
        .chat-container { display: flex; flex-direction: column; height: 70vh; }
        .chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .chat-bubble { max-width: 75%; padding: 10px 15px; border-radius: 16px; font-size: 14px; }
        .chat-sent { background: var(--accent-green-bg); color: var(--accent-green); align-self: flex-end; }
        .chat-received { background: var(--bg-tertiary); align-self: flex-start; }

        /* ============================================ */
        /* UTILITY                                      */
        /* ============================================ */
        .text-green { color: var(--accent-green); }
        .text-muted { color: var(--text-secondary); font-size: 13px; }
        .hidden { display: none !important; }

        .toast {
            position: fixed;
            bottom: 20px; right: 20px;
            padding: 12px 20px;
            border-radius: var(--radius-md);
            color: var(--white);
            z-index: 9999;
            animation: slideInRight 0.3s ease;
            font-weight: 500;
            box-shadow: var(--shadow);
        }
        .toast.success { background: var(--accent-green); }
        .toast.error { background: var(--danger); }

        @keyframes slideInRight {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- Offline Indicator -->
    <div id="offlineIndicator" class="hidden" style="background:var(--danger); color:white; text-align:center; padding:6px; font-size:12px; font-weight:600;">
        Anda sedang Offline. Data disimpan lokal.
    </div>

    <!-- PWA Install Prompt -->
    <div id="pwaInstallPrompt" class="hidden" style="position:fixed; bottom:20px; left:20px; z-index:9998; background:var(--bg-secondary); border:1px solid var(--border-color); padding:15px 20px; border-radius:var(--radius-lg); box-shadow:var(--shadow); max-width:300px;">
        <p style="margin-bottom:10px; font-weight:600;">Install NotepadPro++?</p>
        <div style="display:flex; gap:10px;">
            <button id="installBtn" class="btn btn-primary btn-sm">Install</button>
            <button onclick="document.getElementById('pwaInstallPrompt').classList.add('hidden')" class="btn btn-outline btn-sm">Nanti</button>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- HALAMAN LOGIN                                -->
    <!-- ============================================ -->
    <div id="pageLogin" style="display:flex; justify-content:center; align-items:center; height:100%; width:100%; background:var(--bg-primary);">
        <div class="card" style="width:380px; max-width:90%; text-align:center;">
            <i class="fas fa-book" style="color:var(--accent-green); font-size:48px; margin-bottom:10px;"></i>
            <h2 style="margin-bottom:5px;">NotepadPro++</h2>
            <p class="text-muted" style="margin-bottom:20px;">Login ke Akun Anda</p>
            <div id="loginError" class="hidden" style="background:var(--danger); padding:10px; border-radius:var(--radius-md); margin-bottom:15px; color:white; font-size:13px;"></div>
            <form onsubmit="prosesLogin(event)">
                <div style="margin-bottom:12px;">
                    <input type="text" id="loginUsername" placeholder="Username" required>
                </div>
                <div style="margin-bottom:15px;">
                    <input type="password" id="loginPassword" placeholder="Password" required>
                </div>
                <button type="submit" class="btn btn-primary btn-block">Masuk</button>
            </form>
            <p class="text-muted" style="margin-top:15px; cursor:pointer;" onclick="alert('Hubungi Admin Dede')">Lupa Password?</p>
        </div>
    </div>

    <!-- ============================================ -->
    <!-- APP CONTAINER (AKAN DIISI OLEH BLOK 2)       -->
    <!-- ============================================ -->
    <div id="appContainer" class="hidden" style="height:100%; width:100%; display:flex; flex-direction:column;">
        <!-- Placeholder: Blok 2 akan mengisi sidebar dan main content -->
    </div>

    <!-- Script Placeholder (Data & Fungsi akan diisi di Blok 13-15) -->
    <script>
        // Fungsi login sementara (akan diperbarui di blok JavaScript)
        function prosesLogin(e) {
            e.preventDefault();
            alert('Fungsi login akan tersedia setelah semua blok digabungkan.');
        }
        console.log('✅ NotepadPro++ - Blok 1 berhasil dimuat.');
    </script>
</body>
</html>
